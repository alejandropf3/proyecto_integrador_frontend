<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


<!-- VISTA 1: Registro de Usuarios -->
    <div id="vistaUsuarios" class="vista">

    <div class="vista-header">
        <h1>Registro de Usuarios</h1>
        <button class="btn" id="btnIrTareas">Ir a Tareas</button>
    </div>

    <div>
        <form id="formUsuario">
            <div>
                <label for="documento">Documento</label>
                <input type="text" name="documento" id="documento" placeholder="Ingrese su documento">
            </div>
            <div>
                <label for="nombre">Nombre</label>
                <input type="text" name="nombre" id="nombre" placeholder="Ingrese su nombre">
            </div>
            <div>
            <p>Genero</p>
                <div id="generos" class="generos"></div>
            </div>
            <div>
                <label for="ciudad">Ciudades</label>
                <select name="ciudad" id="ciudadId">
            </select>
            </div>
            <div>
                <label for="correo">Correo</label>
                <input type="text" name="correo" id="correo" placeholder="Ingrese su correo">
            </div>
            <div class="checkbox-line">
                <label for="terminos">¿Acepta las politicas de tratamientos de datos?</label>
                <input type="checkbox" id="terminos">
            </div>
            <div>
                <button class="btn" id="btnEnviar">Enviar</button>
            </div>
        </form>
    </div>

    <div class="seccion-buscar">
        <h2>Buscar Usuario</h2>
        
        <div class="buscar-fila">
            <input type="text" id="buscarDocumento" placeholder="Ingrese documento a buscar">
            <button class="btn" id="btnBuscar">Buscar</button>
        </div>

        <div id="resultadoBusqueda"></div>
    </div>

    <div id="listaUsuarios" class="lista-usuarios"></div>

    </div>

    <!-- VISTA 2: Tareas -->
    <div id="vistaTareas" class="vista oculto">

    <div class="vista-header">
        <h1>Tareas</h1>
        <button class="btn" id="btnIrUsuarios">Ir a Registro de Usuarios</button>
    </div>

    <div class="seccion-tareas">
        <form id="formTarea">
            <div>
                <label for="docTarea">Documento del usuario</label>
                <input type="text" name="docTarea" id="docTarea" placeholder="Ingrese documento del usuario">
            </div>
            <div>
                <label for="tituloTarea">Titulo de la tarea</label>
                <input type="text" name="tituloTarea" id="tituloTarea" placeholder="Ingrese el titulo">
            </div>
            <div>
                <label for="descripcionTarea">Descripcion</label>
                <input type="text" name="descripcionTarea" id="descripcionTarea" placeholder="Ingrese la descripcion">
            </div>
            <div>
                <button class="btn" id="btnCrearTarea">Crear Tarea</button>
            </div>
        </form>
        <div id="listaTareas" class="lista-tareas"></div>
    </div>

    </div>

    <script src="app.js" type="module"></script>
</body>

</html>
